name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --python ${{ matrix.python-version }}

      - name: Verify server loads
        run: |
          uv run --python ${{ matrix.python-version }} python -c "
          import asyncio
          from siteaudit.server import mcp
          tools = asyncio.run(mcp.list_tools())
          print(f'Server loaded with {len(tools)} tools')
          assert len(tools) >= 8, f'Expected >=8 tools, got {len(tools)}'
          "

      - name: Run tests (if present)
        run: |
          if [ -d "tests" ] && [ -n "$(find tests -name 'test_*.py' -o -name '*_test.py' 2>/dev/null)" ]; then
            uv run --python ${{ matrix.python-version }} pytest tests/ -v
          else
            echo "No tests found, skipping"
          fi
